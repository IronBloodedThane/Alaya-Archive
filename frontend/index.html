        <h1>Alaya Archive</h1>
        <p>Alaya Archive is a privacy-focused catalog for manga, movies, anime, books, and games. Track what you own, what you've watched or read, rate and tag your collection, and share it with friends.</p>
        <h2>What you can do</h2>
        <ul>
          <li>Track manga volumes, movies, anime series, books, and games in a single collection.</li>
          <li>Rate entries, add custom tags, and record progress as you go.</li>
          <li>Share your collection with friends and compare what you've seen.</li>
          <li>Install as a mobile app — works offline thanks to PWA support.</li>
        </ul>
        <h2>Get started</h2>
        <p>
          <a href="/register">Create an account</a> to start cataloging your collection,
          <a href="/login">sign in</a> if you already have one, or
          <a href="/about">learn more about the project</a>.
        </p>
        <p>You'll need JavaScript enabled to use the app itself.</p>
