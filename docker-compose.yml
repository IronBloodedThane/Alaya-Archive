services:
  api:
    build: ./backend-go
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/alaya-archive.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - EMAIL_API_KEY=${EMAIL_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Vite needs to reach the api service by its compose-network hostname,
      # not localhost (which would point at the frontend container itself).
      - VITE_API_PROXY_TARGET=http://api:8080
    volumes:
      # Bind-mount source for hot reload, but keep the container's
      # node_modules so host-installed deps don't shadow them.
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
